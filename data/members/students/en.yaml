# Add one top-level entry per member.
# display: true shows the member; display: false hides the member.
# image: optional path under /static, for example /images/members/students/example_student.png
# group: student
# student_type: doctoral | master | research | undergraduate | exchange_preparatory
# grade examples: D1, D2, D3, M1, M2, B4

student_type_sort_rule:
  - "doctoral"
  - "master"
  - "research"
  - "undergraduate"
  - "exchange_preparatory"

