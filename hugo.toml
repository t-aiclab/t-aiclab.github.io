baseURL = "https://t-aiclab.github.io/"
title = "AIC Lab"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
# Hide complete languages here. Example: disableLanguages = ["zh"]
disableLanguages = []

[params]
  browserTitle = "AIC Lab"
  brandName = "AIC Lab (Tang Lab)"
  logo = "images/aiclab_logo.png"
  favicon = "favicon-aiclab-32x32.png"
  faviconIco = "favicon-aiclab.ico"
  appleTouchIcon = "apple-touch-icon-aiclab.png"
  description = "AIC Lab research laboratory website"
  # Show or hide all citation metrics on publication pages.
  showCitations = true

[params.visibility]
  # Hide complete languages at template level. Example: disabledLanguages = ["zh"]
  # To stop Hugo from generating a language entirely, also set top-level disableLanguages above.
  disabledLanguages = []
  # Hide complete sections in all languages. Example: disabledSections = ["access"]
  # Available section keys: research, members, publications, projects, news, access, links
  disabledSections = ["links"]

[markup.goldmark.renderer]
  unsafe = true

[languages.en]
  languageName = "English"
  languageCode = "en-us"
  contentDir = "content/en"
  weight = 1
  title = "AIC Lab"
  [languages.en.params]
    labName = "Artificial Intelligence and Communication Laboratory"
    labShortName = "AIC Lab"

[[languages.en.menu.main]]
  name = "Home"
  pageRef = "/"
  weight = 10
